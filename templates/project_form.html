{% extends 'base.html' %}
{% block title %}New Project{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
  <div class="card shadow-sm">
    <div class="card-header"><strong>New Project</strong></div>
    <div class="card-body">
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Project Name *</label>
          <input type="text" name="name" class="form-control" required placeholder="e.g. EMEA Expansion Q3">
        </div>
        <div class="mb-3">
          <label class="form-label">Supernet (parent CIDR) *</label>
          <input type="text" name="supernet" class="form-control" required placeholder="e.g. 10.20.0.0/16">
          <div class="form-text">All subnets in this project will be carved from this block.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <input type="text" name="description" class="form-control">
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Create Project</button>
          <a href="{{ url_for('ipam.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
