{% extends 'base.html' %}
{% block title %}Edit Subnet{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-7">
  <div class="card shadow-sm">
    <div class="card-header">
      <strong>Edit Subnet</strong> <code>{{ net.cidr }}</code>
      {% if net.project_id %}
      <a href="{{ url_for('ipam.manage_project_labels', pid=net.project_id) }}" class="float-end small text-muted">
        🏷️ Manage project labels
      </a>
      {% endif %}
    </div>
    <div class="card-body">
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" name="name" class="form-control" value="{{ net.name }}">
        </div>

        {% set current_value = current_labels %}
        {% include '_label_picker.html' %}

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">VLAN</label>
            <input type="number" name="vlan" class="form-control" value="{{ net.vlan }}" min="1" max="4094">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <input type="text" name="description" class="form-control" value="{{ net.description }}">
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Save</button>
          <a href="{{ url_for('ipam.project_detail', pid=net.project_id) }}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
