<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IPAM – {% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f2f8; }
    .navbar { background: #1a2340 !important; }

    /* Label pills */
    .label-pill { font-size:.75rem; padding:2px 8px; border-radius:12px; margin:1px; display:inline-block; }
    .label-global  { background:#e3f2fd; color:#1565c0; border:1px solid #90caf9; }
    .label-project { background:#f3e5f5; color:#6a1b9a; border:1px solid #ce93d8; }
    .label-unknown { background:#e8eaf6; color:#3949ab; border:1px solid #c5cae9; }
    .label-pill:not(.label-global):not(.label-project):not(.label-unknown)
                   { background:#e8eaf6; color:#3949ab; border:1px solid #c5cae9; }

    /* Template scope badges */
    .tmpl-global  { background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; }
    .tmpl-project { background:#fff3e0; color:#e65100; border:1px solid #ffcc80; }

    /* Status badges */
    .badge-allocated { background:#0d6efd; }
    .badge-reserved  { background:#6c757d; }
    .badge-dhcp      { background:#0dcaf0; color:#000; }

    /* Phantom (pending) rows */
    .row-phantom td { opacity:.65; font-style:italic; }
    .row-phantom { border-left: 3px solid #fd7e14; }

    .util-bar { height:6px; border-radius:3px; }
    code { color:#c0392b; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('ipam.index') }}">🗺️ IPAM</a>
    <div class="navbar-nav me-auto flex-row gap-3 ms-3">
      <a class="nav-link text-white-50" href="{{ url_for('ipam.index') }}">Projects</a>
      <a class="nav-link text-white-50" href="{{ url_for('ipam.overview') }}">📊 Overview</a>
      <a class="nav-link text-white-50" href="{{ url_for('ipam.pool_ui') }}">Pool Query</a>
      <a class="nav-link text-white-50" href="{{ url_for('ipam.manage_global_labels') }}">🌐 Labels</a>
      <a class="nav-link text-white-50" href="{{ url_for('ipam.list_templates') }}">📐 Templates</a>
      <a class="nav-link text-white-50" href="{{ url_for('ne.list_ne_types') }}">🔧 NE Types</a>
      <a class="nav-link text-white-50" href="{{ url_for('ne.admin_schemas') }}">⚙️ Schemas</a>
      <a class="nav-link text-white-50" href="{{ url_for('hw.hw_templates_list') }}">🖥 HW Templates</a>
      <a class="nav-link text-white-50" href="{{ url_for('hw.hw_connectors') }}">🔌 Connectors</a>
      <a class="nav-link text-white-50" href="{{ url_for('vmware.vmware_index') }}">☁️ VMware</a>
    </div>
    <form class="d-flex" action="{{ url_for('ipam.search') }}" method="get">
      <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="Search IP / hostname…">
      <button class="btn btn-sm btn-outline-light">Search</button>
    </form>
  </div>
</nav>
<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show py-2">
        {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script>
function addLabel(label, inputId) {
  inputId = inputId || 'labelsInput';
  const inp = document.getElementById(inputId);
  if (!inp) return;
  const existing = inp.value.split(',').map(s => s.trim()).filter(Boolean);
  if (!existing.includes(label)) { existing.push(label); inp.value = existing.join(', '); }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
