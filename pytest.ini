[pytest]
# ── Discovery ────────────────────────────────────────────────────────────────
testpaths   = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ───────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# ── Markers ──────────────────────────────────────────────────────────────────
markers =
    unit:   Pure logic tests — no I/O, no HTTP
    api:    Flask test-client tests (fakeredis, no browser)
    e2e:    Full browser tests via Playwright (requires live server + Chromium)
    slow:   Tests that take >2 seconds

# ── Async ────────────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Playwright ───────────────────────────────────────────────────────────────
# Default browser for E2E tests
playwright_browser = chromium
